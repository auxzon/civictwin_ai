<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Enterprise Spatial Intelligence for Modern Governance">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="CivicTwin AI">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- Google Fonts for Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">

  <!-- Google Maps JavaScript API -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD5qsKjtT2RepdzpsDuUCrDlPLuHQAV0lI"></script>

  <title>CivicTwin AI</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <style>
    body {
      background-color: #070809;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .logo-container {
      width: 64px;
      height: 64px;
      position: relative;
      margin-bottom: 28px;
      animation: pulse 2s infinite ease-in-out;
    }
    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 0.8;
        filter: drop-shadow(0 0 4px rgba(0, 229, 255, 0.2));
      }
      50% {
        transform: scale(1.05);
        opacity: 1;
        filter: drop-shadow(0 0 16px rgba(0, 229, 255, 0.6));
      }
    }
    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid rgba(0, 229, 255, 0.1);
      border-radius: 50%;
      border-top-color: #00E5FF;
      animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .text {
      color: #94A3B8;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
  <div id="loading-splash" class="loading-container">
    <div class="logo-container">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M 12 16 A 24 24 0 1 0 12 48" stroke="#E2E8F0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.85" />
        <path d="M 22 24 L 42 24 M 32 24 L 32 46" stroke="#00E5FF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
      </svg>
    </div>
    <div class="spinner"></div>
    <div class="text">CIVICTWIN AI</div>
  </div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
