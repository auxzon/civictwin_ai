name: civictwin_ai
description: "CivicTwin AI — The AI Brain for Constituency Planning"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # --- State Management ---
  flutter_riverpod: ^2.6.1

  # --- Maps (Decision 8: map data served via backend, not direct Firestore) ---
  google_maps_flutter: ^2.9.0
  google_maps_flutter_web: ^0.5.10

  # --- Firebase (Decision 5: Auth only — Firestore access is backend-only) ---
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3

  # --- Networking (Decision 5/6: REST only, no direct Firestore, no WebSockets) ---
  http: ^1.2.2

  # --- Web Speech API JS interop (Decision 7) ---
  web: ^1.1.0

  # --- Icons ---
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/map_style.json
